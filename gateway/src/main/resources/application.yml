spring:
  application:
    name: vectorflow-gateway

  # GraphQL Configuration
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    path: /graphql
    schema:
      locations: classpath:graphql/

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:vectorflow_sql_db}
    username: ${POSTGRES_USER:vectorflow}
    password: ${POSTGRES_PASSWORD:vectorflow123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Jackson Configuration
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

# Server Configuration
server:
  port: 8080

# Custom Application Properties
app:
  python-service:
    url: ${PYTHON_SERVICE_URL:http://localhost:8000}
  jwt:
    secret: ${JWT_SECRET:vectorflow-super-secret-key-change-in-production}
    expiration: 86400000  # 24 hours in milliseconds
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# Logging
logging:
  level:
    com.vectorflow: DEBUG
    org.springframework.graphql: DEBUG

