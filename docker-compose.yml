services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vectorflow-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vectorflow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vectorflow_sql_db}
      POSTGRES_USER: ${POSTGRES_USER:-vectorflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vectorflow123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vectorflow} -d ${POSTGRES_DB:-vectorflow_sql_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vectorflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python Service (FastAPI)
  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: vectorflow-python
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vectorflow_sql_db}
      - POSTGRES_USER=${POSTGRES_USER:-vectorflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vectorflow123}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - ./python-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Spring Boot Gateway
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: vectorflow-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - PYTHON_SERVICE_URL=http://python-service:8000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vectorflow_sql_db}
      - POSTGRES_USER=${POSTGRES_USER:-vectorflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vectorflow123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-vectorflow-super-secret-key-change-in-production}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-service:
        condition: service_started

  # React Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vectorflow-frontend
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_started

volumes:
  qdrant_data:
  postgres_data:
  redis_data:

